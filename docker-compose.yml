services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tq_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////data/tasks.db
      - WORKER_QUEUES=default,high,low
      - PURGE_COMPLETED_AFTER_HOURS=24
    volumes:
      - db_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tq_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////data/tasks.db
      - WORKER_QUEUES=default,high,low
      - BRPOP_TIMEOUT=5
    volumes:
      - db_data:/data
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - tq_net

volumes:
  redis_data:
  db_data:

networks:
  tq_net:
    driver: bridge
